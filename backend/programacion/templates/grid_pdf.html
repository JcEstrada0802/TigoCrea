<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <style>
        @page {
            size: 297mm 312mm;
            margin: 0.5cm;
        }

        :root {
            --color-primary: #0b3d91;
            --color-border-light: #e6eef9;
            --color-text-light: #6b7280;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #12263f;
        }

        .header-banner {
            display: table;
            width: 100%;
            margin-bottom: 5px;
        }

        .header-cell {
            display: table-cell;
            vertical-align: middle;
        }

        .logo-cell { width: 25%; text-align: left; }
        .info-cell { width: 75%; text-align: right; }

        .logo { max-height: 45px; }

        .report-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--color-primary);
            text-transform: uppercase;
            border-bottom: 2px solid var(--color-primary);
            display: inline-block;
            margin: 0;
        }

        .header-meta {
            font-size: 9px;
            color: var(--color-text-light);
            margin-top: 2px;
        }

        .table-wrap {
            border: 1px solid var(--color-border-light);
            border-radius: 8px;
            display: table;
            width: 100%;
        }

        .grid-table {
            display: table;
            width: 100%;
            table-layout: fixed;
        }

        .col-day,
        .col-time {
            display: table-cell;
            vertical-align: top;
            border-right: 1px solid var(--color-border-light);
        }

        .day-title {
            height: 25px;
            line-height: 25px;
            background: var(--color-primary);
            color: white;
            text-align: center;
            font-size: 9px;
            font-weight: 700;
        }

        /* === COLUMNA HORAS === */

        .hour-header-spacer {
            height: 25px;
            background: #f8fafc;
            border-bottom: 1px solid var(--color-border-light);
        }

        .hour-cell {
            height: {{ slot_height }};
            line-height: {{ slot_height }};
            font-size: 7px;
            color: #94a3b8;
            text-align: center;
            border-bottom: 1px solid #f1f5f9;
            box-sizing: border-box;
        }

        /* === CONTENEDOR EVENTOS === */

       .events-wrapper {
            position: relative;
            top: 1px;
            height: {{ total_height }};
        }

        .time-slots {
            position: absolute;
            left: 0;
            right: 0;
        }

        .time-slot {
            height: {{ slot_height }};
            border-bottom: 1px solid #e5e7eb;
            box-sizing: border-box;
        }


        .event-node {
            position: absolute;
            left: 2px;
            right: 2px;
            color: white;
            border-radius: 4px;
            font-size: 7px;
            padding: 2px;
            box-sizing: border-box;
            border-left: 3px solid rgba(0,0,0,0.2);
            overflow: hidden;
        }

    </style>
</head>
<body>

<div class="header-banner">
    <div class="header-cell logo-cell">
        <img class="logo" src="data:image/png;base64,{{ logo_data }}" alt="Logo" />
    </div>
    <div class="header-cell info-cell">
        <div class="report-title">{{ report_title }}</div>
        <div class="header-meta">
            {{ first_name }} {{ last_name }} | ID: {{ calendar_id }} | {{ export_date }}
        </div>
    </div>
</div>

<div class="table-wrap">
    <div class="grid-table">

        <!-- COLUMNA HORAS -->
        <div class="col-time" style="width: 40px;">
            <div class="hour-header-spacer"></div>
            {% for h in horas %}
                <div class="hour-cell">{{ h }}</div>
            {% endfor %}
        </div>

        <!-- COLUMNAS DÍAS -->
        {% for dia in dias %}
        <div class="col-day">

            <div class="day-title">{{ dia.nombre }}</div>

            <div class="events-wrapper">

                <!-- Slots reales con borde -->
                <div class="time-slots">
                    {% for h in horas %}
                        <div class="time-slot"></div>
                    {% endfor %}
                </div>

                <!-- Eventos -->
                {% for ev in dia.eventos %}
                    <div class="event-node"
                        style="top: {{ ev.top_style }};
                                height: {{ ev.height_style }};
                                background-color: {{ ev.color }};">
                        <strong>{{ ev.time_range }}</strong><br>
                        {{ ev.title }}
                    </div>
                {% endfor %}

            </div>

        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
